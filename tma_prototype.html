<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMA Dashboard Prototype</title>
    <style>
        :root {
            --bg-color: #050510;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #1a1a40, #050510);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--neon-blue), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .status-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .dept-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .count-badge {
            background: rgba(0, 242, 255, 0.2);
            color: var(--neon-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            width: 100%;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), #00c2ff);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 1s ease-out;
        }

        .details {
            max-height: 0;
            opacity: 0;
            transition: all 0.4s ease;
            margin-top: 0;
        }

        .status-card.active .details {
            max-height: 500px;
            opacity: 1;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .employee-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .employee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .emp-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, #333, #666);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
        }

        .emp-name { font-weight: 500; }
        .emp-time { color: var(--text-dim); font-size: 0.85rem; }

        .tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>Live Center Dashboard</h1>
    </header>

    <div class="status-card" onclick="this.classList.toggle('active')">
        <div class="card-header">
            <span class="dept-name">GDS Operations</span>
            <span class="count-badge">5 Online</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width: 75%;"></div>
        </div>
        <div class="details">
            <ul class="employee-list">
                <li class="employee-item">
                    <div class="emp-info">
                        <div class="avatar">ИП</div>
                        <span class="emp-name">Иван Петров</span>
                    </div>
                    <span class="emp-time">до 18:00 <span class="tag">Active</span></span>
                </li>
                <li class="employee-item" style="animation-delay: 0.1s">
                    <div class="emp-info">
                        <div class="avatar">АС</div>
                        <span class="emp-name">Анна Сидорова</span>
                    </div>
                    <span class="emp-time">до 19:30 <span class="tag">Active</span></span>
                </li>
                <li class="employee-item" style="animation-delay: 0.2s">
                    <div class="emp-info">
                        <div class="avatar">МК</div>
                        <span class="emp-name">Максим Кузнецов</span>
                    </div>
                    <span class="emp-time">до 20:00 <span class="tag">Active</span></span>
                </li>
            </ul>
        </div>
    </div>

    <div class="status-card" onclick="this.classList.toggle('active')">
        <div class="card-header">
            <span class="dept-name">NDC Support</span>
            <span class="count-badge">3 Online</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width: 45%;"></div>
        </div>
        <div class="details">
            <ul class="employee-list">
                <li class="employee-item">
                    <div class="emp-info">
                        <div class="avatar">ДВ</div>
                        <span class="emp-name">Дмитрий Волков</span>
                    </div>
                    <span class="emp-time">до 17:00</span>
                </li>
                <li class="employee-item" style="animation-delay: 0.1s">
                    <div class="emp-info">
                        <div class="avatar">ЕК</div>
                        <span class="emp-name">Елена Козлова</span>
                    </div>
                    <span class="emp-time">до 18:00</span>
                </li>
            </ul>
        </div>
    </div>

    <div class="status-card" style="opacity: 0.7; border-style: dashed;">
        <div class="card-header">
            <span class="dept-name">VIP Service</span>
            <span style="color: var(--neon-pink); font-weight: 600;">OFFLINE</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width: 0%; box-shadow: none;"></div>
        </div>
    </div>

    <script>
        // Интерактива мало не бывает
        console.log("TMA Prototype Initialized");
    </script>
</body>
</html>

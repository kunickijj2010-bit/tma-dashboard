# Workflow для автоматического деплоя на GitHub Pages
name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard-tma/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard-tma

      - name: Build
        run: npm run build
        working-directory: dashboard-tma

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard-tma/dist'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
